<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-label="Profile photo placeholder">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="55%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="55%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#bg)" stroke="url(#ring)" stroke-width="3"/>
  <!-- Neutral silhouette (no initials) — swap file when you add a headshot -->
  <g fill="none" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="100" cy="86" r="24" fill="#cbd5e1" fill-opacity="0.12"/>
    <path
      d="M 52 168 c 0 -36 22 -56 48 -56 s 48 20 48 56"
      fill="#cbd5e1"
      fill-opacity="0.08"
      stroke="#94a3b8"
      stroke-width="4"
    />
  </g>
</svg>
