<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-label="Ethan Trent monogram">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <radialGradient id="face" cx="35%" cy="30%" r="75%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="45%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#38bdf8" flood-opacity="0.25"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#face)" stroke="url(#ring)" stroke-width="3"/>
  <g transform="translate(100 108) rotate(-4)" filter="url(#soft)">
    <text x="-38" y="12" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="56" font-weight="800" letter-spacing="-0.06em">E</text>
    <text x="22" y="14" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="48" font-weight="800" letter-spacing="-0.08em" opacity="0.92">T</text>
  </g>
</svg>
